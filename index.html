<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sleep · 助眠环境音</title>
    <style>
      /* 全局重置:去掉 body 默认 8px 白边;背景与渐变底部同色防白闪;关掉移动端点击高亮;
         box-sizing border-box 让 main 的 100vh + padding 不再溢出导致滚动 */
      *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      /* 把文档锁死在视口内:height 100% 链式撑满,overflow hidden 杜绝整页滚动,
         overscroll-behavior none 关掉 Android Chrome 下拉刷新的过滚动——
         那是导致 100vh 与可见区脱钩、背景变长可滚的根因 */
      html, body { margin: 0; padding: 0; height: 100%; background: #07060f; overflow: hidden;
                   overscroll-behavior: none; }
      #app { height: 100%; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
